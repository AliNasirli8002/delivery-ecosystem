server:
  port: 8081

spring:
  application:
    name: ms-order
  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest