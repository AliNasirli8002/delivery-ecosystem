server:
  port: 8083

spring:
  application:
    name: ms-payment

  datasource:
    url: jdbc:postgresql://localhost:5433/payment_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  rabbitmq:
    host: localhost
    port: 5673
    username: guest
    password: guest